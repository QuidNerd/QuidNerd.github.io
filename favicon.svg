<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Stuff">
  <!-- The site's component recipe in miniature: yellow fill, black border,
       hard offset shadow, no blur, no radius — on a transparent field.

       The shadow carries the SAME stroke as the star. Without it the shadow's
       silhouette is smaller than the stroked star, so its arms peek through as
       thin spikes instead of reading as one solid offset copy.

       The path is duplicated rather than <use>d on purpose: favicons get
       rendered by a lot of different engines and a flat two-path file is the
       one thing all of them agree on. -->

  <!-- shadow -->
  <path d="M14.4 2.6 Q16 12.8 26.2 14.4 Q16 16 14.4 26.2 Q12.8 16 2.6 14.4 Q12.8 12.8 14.4 2.6 Z"
        transform="translate(3.1 3.1)"
        fill="#000000" stroke="#000000" stroke-width="1.7" stroke-linejoin="miter"/>

  <!-- star -->
  <path d="M14.4 2.6 Q16 12.8 26.2 14.4 Q16 16 14.4 26.2 Q12.8 16 2.6 14.4 Q12.8 12.8 14.4 2.6 Z"
        fill="#ffd93d" stroke="#000000" stroke-width="1.7" stroke-linejoin="miter"/>
</svg>
