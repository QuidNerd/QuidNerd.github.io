<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compendium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --body-bg: #e3d7b6;
  --page-bg: #ece2c8;
  --border-dark: #3a3226;
  --border-light: #b9ab8a;
  --ink: #2a2418;
  --ink-dim: #6b6050;
  --ink-faint: #9c9484;
  --accent: #3f6b52;
  --accent-bright: #4f8a68;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--body-bg);
  background-image:
    radial-gradient(circle at 20% 15%, rgba(63,107,82,0.06), transparent 45%),
    radial-gradient(circle at 80% 85%, rgba(58,50,38,0.05), transparent 45%);
  color: var(--ink); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 30px 16px;
}
.frame { max-width: 520px; width: 100%; border: 1.5px solid var(--border-dark); padding: 5px; box-shadow: 0 14px 40px rgba(42,36,24,0.25); }
.page {
  border: 1px solid var(--border-light); background: var(--page-bg);
  padding: 56px 50px; text-align: center;
}
.fleuron { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; }
.eyebrow { color: var(--ink-dim); font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; }
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; font-size: 3.1rem; color: var(--ink);
  letter-spacing: 2px; margin-top: 10px; text-transform: uppercase;
}
.sub { color: var(--ink-dim); font-size: 1.15rem; margin: 14px 0 34px; font-style: italic; }
.rule { width: 90px; height: 1px; background: var(--border-light); margin: 0 auto 30px; }
.contents-label { color: var(--ink-dim); font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }

nav { text-align: left; }
.toc-entry {
  display: flex; align-items: baseline; gap: 10px; text-decoration: none;
  color: var(--ink); font-size: 1.25rem; padding: 12px 2px;
}
.toc-entry .num { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--accent); font-weight: 600; width: 26px; flex: none; }
.toc-entry .title { white-space: nowrap; }
.toc-entry .leader { flex: 1; border-bottom: 1px dotted var(--border-light); transform: translateY(-6px); margin: 0 4px; }
.toc-entry:hover { color: var(--accent); }
.toc-entry:hover .leader { border-color: var(--accent); }

.footnote { margin-top: 30px; color: var(--ink-faint); font-size: 0.9rem; font-style: italic; }
</style>
</head>
<body>
<div class="frame">
  <div class="page">
    <div class="fleuron">&#10086;</div>
    <div class="eyebrow">Ex Libris</div>
    <h1>Compendium</h1>
    <p class="sub">purpose and contents alike, not yet decided</p>
    <div class="rule"></div>
    <div class="contents-label">Contents</div>
    <nav>
      <a class="toc-entry" href="quidmodding/">
        <span class="num">I.</span>
        <span class="title">Quidditch Mod Tool</span>
        <span class="leader"></span>
      </a>
      <a class="toc-entry" href="gringotts/">
        <span class="num">II.</span>
        <span class="title">Gringotts Currency Exchange</span>
        <span class="leader"></span>
      </a>
    </nav>
    <div class="rule" style="margin-top:30px;"></div>
    <div class="footnote">more chapters to be added, once sufficient motivation materializes</div>
  </div>
</div>
</body>
</html>
