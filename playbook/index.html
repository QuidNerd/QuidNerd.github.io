<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactica — Quidditch Play &amp; Strategy Drafts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --body-bg: #e3d7b6;
  --page-bg: #ece2c8;
  --border-dark: #3a3226;
  --border-light: #b9ab8a;
  --ink: #2a2418;
  --ink-dim: #6b6050;
  --ink-faint: #9c9484;
  --accent: #3f6b52;
  --accent-bright: #4f8a68;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--body-bg);
  background-image:
    radial-gradient(circle at 15% 10%, rgba(63,107,82,0.06), transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(58,50,38,0.05), transparent 45%);
  color: var(--ink); min-height: 100vh;
  padding: 40px 16px 70px;
}

.frame { max-width: 820px; margin: 0 auto; border: 1.5px solid var(--border-dark); padding: 5px; box-shadow: 0 14px 40px rgba(42,36,24,0.25); }
.page { border: 1px solid var(--border-light); background: var(--page-bg); padding: 50px 54px; }

.fleuron { text-align:center; color: var(--accent); font-size: 1.4rem; margin-bottom: 8px; }
.eyebrow { text-align:center; color: var(--ink-dim); font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; }
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 700; font-size: clamp(1.9rem, 10vw, 3.4rem); color: var(--ink);
  letter-spacing: clamp(0px, 1vw, 2px); text-align:center; margin: 10px 0 8px; text-transform: uppercase;
  overflow-wrap: anywhere;
}
.subtitle {
  font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 1.3rem; color: var(--ink-dim);
  text-align:center; margin-bottom: 20px;
}
.site-nav { display:flex; justify-content:center; gap:20px; margin-bottom: 30px; flex-wrap: wrap; }
.site-nav a {
  font-family: 'EB Garamond', Georgia, serif; font-size: 0.9rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--accent); text-decoration: underline; text-underline-offset: 4px; transition: color 0.2s;
}
.site-nav a:hover { color: var(--accent-bright); }
.site-nav-select {
  display: none; width: 100%; max-width: 300px; margin: 0 auto 30px;
  font-family: 'EB Garamond', Georgia, serif; font-size: 0.92rem; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--accent); background: var(--page-bg); border: 1px solid var(--border-light);
  padding: 10px 14px; text-align: center; text-align-last: center; cursor: pointer;
}
.site-nav-select:focus { outline: none; border-color: var(--accent); }

.rule { width: 90px; height: 1px; background: var(--border-light); margin: 0 auto 32px; }
.rule-orn { display:flex; align-items:center; gap:16px; margin: 34px 0; }
.rule-orn-line { flex:1; height:1px; background: var(--border-light); }
.rule-orn-mark { color: var(--accent); font-size: 1rem; }

.intro { text-align:center; font-style: italic; color: var(--ink-dim); font-size: 1.05rem; margin-bottom: 8px; line-height: 1.7; }

/* rendered BBCode */
.bb-body { font-size: 0.98rem; line-height: 1.75; color: var(--ink); }
.bb-quote {
  border-left: 3px solid var(--accent); padding: 14px 18px; margin: 12px 0;
  background: rgba(58,50,38,0.035); color: var(--ink); font-style: normal;
}
.bb-quote > .bb-quote {
  display: inline-block; border-left: none; border: 1px solid var(--accent);
  background: rgba(63,107,82,0.09); color: var(--accent); font-weight: 600;
  font-size: 0.85rem; font-style: normal; padding: 4px 12px; margin: 10px 0 0;
}
.bb-quote > .bb-quote::before { content: "\2192\00A0"; }

.play-list { display:flex; flex-direction:column; gap: 30px; }
.play-entry { border: 1px solid var(--border-light); padding: 22px 24px; }
.play-eyebrow { text-align:center; color: var(--ink-dim); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
.play-title-text {
  display:block; text-align:center; font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600;
  font-size: 1.5rem; color: var(--ink); margin-bottom: 16px;
}
.play-empty { text-align:center; color: var(--ink-faint); font-style: italic; padding: 20px 0; }

.page-num { text-align:center; margin-top: 40px; color: var(--ink-faint); font-size: 1rem; }

@media(max-width:560px) {
  .site-nav { display: none; }
  .site-nav-select { display: block; }
  .page { padding: 40px 24px; }
  .play-entry { padding: 18px 16px; }
}
</style>
</head>
<body>
<div class="frame">
  <div class="page">

    <div class="fleuron">&#10086;</div>
    <div class="eyebrow">The War Room</div>
    <h1>Tactica</h1>
    <p class="subtitle">Quidditch Play &amp; Strategy Drafts</p>
    <div class="site-nav">
      <a href="../">Home</a>
      <a href="../quidmodding/">Kennilworthy's Almanack</a>
      <a href="../gringotts/">Ledger</a>
      <a href="../bbcode-fixer/">Marginalia</a>
    </div>
    <select class="site-nav-select" onchange="if(this.value) location.href=this.value;">
      <option value="" selected disabled>Navigate&hellip;</option>
      <option value="../">Home</option>
      <option value="../quidmodding/">Kennilworthy's Almanack</option>
      <option value="../gringotts/">Ledger</option>
      <option value="../bbcode-fixer/">Marginalia</option>
    </select>
    <div class="rule"></div>

    <p class="intro">A running collection of drafted quidditch plays and strategies, kept here for reference.</p>

    <div class="rule-orn"><span class="rule-orn-line"></span><span class="rule-orn-mark">&#10086;</span><span class="rule-orn-line"></span></div>

    <div class="play-list" id="play-list"></div>

    <div class="page-num">&mdash; IV &mdash;</div>

  </div>
</div>

<script>
// ==================== ADD NEW PLAYS HERE ====================
// Each entry: { title: "...", body: "raw BBCode text" }
const PLAYS = [
  {
    title: "Keeper Truancy",
    body: `[quote]Your keeper is allergic to keeping. Recommended for keepers with high accuracy and an aggressive playstyle, deployed under a strategist who wants to squeeze every last drop out of the action economy. Given the round limit of five quaffle grabs, hoarding the quaffle technically counts as defense too — if the opposing team does not have the ball, they cannot score.
[quote]Keeper: Quaffle Grab & Score[/quote]
[/quote]`
  },
];
// ================================================================

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tokenize(text) {
  const re = /\[(\/?)(b|i|u|s|quote)\]/gi;
  const tokens = [];
  let last = 0, m;
  while ((m = re.exec(text))) {
    if (m.index > last) tokens.push({ type: 'text', value: text.slice(last, m.index) });
    tokens.push({ type: m[1] ? 'close' : 'open', tag: m[2].toLowerCase() });
    last = m.index + m[0].length;
  }
  if (last < text.length) tokens.push({ type: 'text', value: text.slice(last) });
  return tokens;
}

function buildTree(tokens) {
  let i = 0;
  function parseUntil(stopTag) {
    const nodes = [];
    while (i < tokens.length) {
      const t = tokens[i];
      if (t.type === 'text') { nodes.push({ type: 'text', value: t.value }); i++; continue; }
      if (t.type === 'open') { i++; const children = parseUntil(t.tag); nodes.push({ type: 'tag', tag: t.tag, children }); continue; }
      if (t.type === 'close') {
        if (t.tag === stopTag) { i++; return nodes; }
        i++; continue;
      }
    }
    return nodes;
  }
  return parseUntil(null);
}

function renderNodes(nodes) {
  return nodes.map(n => {
    if (n.type === 'text') return esc(n.value).replace(/\n/g, '<br>');
    const inner = renderNodes(n.children);
    switch (n.tag) {
      case 'b': return `<b>${inner}</b>`;
      case 'i': return `<i>${inner}</i>`;
      case 'u': return `<u>${inner}</u>`;
      case 's': return `<s>${inner}</s>`;
      case 'quote': return `<div class="bb-quote">${inner}</div>`;
      default: return inner;
    }
  }).join('');
}

function renderBBCode(text) {
  if (!text.trim()) return '';
  return renderNodes(buildTree(tokenize(text)));
}

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];

function renderPlayList() {
  const el = document.getElementById('play-list');
  if (!PLAYS.length) {
    el.innerHTML = '<div class="play-empty">no plays drafted yet</div>';
    return;
  }
  el.innerHTML = PLAYS.map((p, i) => `
    <div class="play-entry">
      <div class="play-eyebrow">Play ${ROMAN[i] || (i+1)}</div>
      <span class="play-title-text">${esc(p.title || 'Untitled Play')}</span>
      <div class="bb-body">${renderBBCode(p.body)}</div>
    </div>
  `).join('');
}

renderPlayList();
</script>
</body>
</html>
