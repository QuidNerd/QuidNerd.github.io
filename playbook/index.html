<script>
// ==================== ADD NEW PLAYS HERE ====================
// Each entry: { title: "...", body: "raw BBCode text" }
const PLAYS = [
  {
    title: "Keeper Truancy",
    body: `[quote]Your keeper is allergic to keeping. Recommended for keepers with high accuracy and an aggressive playstyle, deployed under a strategist who wants to squeeze every last drop out of the action economy. Given the round limit of five quaffle grabs, hoarding the quaffle [i]technically[/i] counts as defense too — if the opposing team does not have the ball, they cannot score.
[quote][b]Keeper:[/b] Quaffle Grab & Score[/quote]
[/quote]`,
    refs: [
      { label: "GvsH fall 2025", url: "https://hogwarts.io/viewtopic.php?t=41706" },
      { label: "SvsH winter 2026", url: "https://hogwarts.io/viewtopic.php?t=44042" },
      { label: "HvsR spring 2026", url: "https://hogwarts.io/viewtopic.php?t=46278" },
    ]
  },
  {
    title: "Mass Suicide",
    body: `[quote]Holding a lead but the opposing Seeker's ahead in snitch progress and about to catch it? If taking them out physically isn't an option, because your team's lost its bite or they're buried under bodyguards, try changing your mindset instead. You don't need to catch the Snitch or kill off every enemy to win, killing off your own scorers works just as well! (Beaters are exempt since they can't put points on the board)
    [quote][b]Highest ACC Player:[/b] Quaffle Grab & Pass (1st grab → pass to player 2, 2nd grab → pass to player 3, 3rd grab → pass to player 4, 4th grab → pass to player 5)
[b]Player 2:[/b] Chelmondiston Charge (attempt Quaffle Grab; use immediately on first possession)
[b]Player 3:[/b] Chelmondiston Charge (attempt Quaffle Grab; use immediately on first possession)
[b]Player 4:[/b] Chelmondiston Charge (attempt Quaffle Grab; use immediately on first possession)
[b]Player 5:[/b] Chelmondiston Charge (attempt Quaffle Grab; use immediately on first possession)
[b]Beater 1:[/b] Debuff foul on opponent seeker
[b]Beater 2:[/b] Chillax[/quote][/quote]`,
    refs: [
      { label: "HvsR spring 2026", url: "https://hogwarts.io/viewtopic.php?t=46278" },
    ]
  },
];
// ================================================================

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tokenize(text) {
  const re = /\[(\/?)(b|i|u|s|quote)\]/gi;
  const tokens = [];
  let last = 0, m;
  while ((m = re.exec(text))) {
    if (m.index > last) tokens.push({ type: 'text', value: text.slice(last, m.index) });
    tokens.push({ type: m[1] ? 'close' : 'open', tag: m[2].toLowerCase() });
    last = m.index + m[0].length;
  }
  if (last < text.length) tokens.push({ type: 'text', value: text.slice(last) });
  return tokens;
}

function buildTree(tokens) {
  let i = 0;
  function parseUntil(stopTag) {
    const nodes = [];
    while (i < tokens.length) {
      const t = tokens[i];
      if (t.type === 'text') { nodes.push({ type: 'text', value: t.value }); i++; continue; }
      if (t.type === 'open') { i++; const children = parseUntil(t.tag); nodes.push({ type: 'tag', tag: t.tag, children }); continue; }
      if (t.type === 'close') {
        if (t.tag === stopTag) { i++; return nodes; }
        i++; continue;
      }
    }
    return nodes;
  }
  return parseUntil(null);
}

function renderNodes(nodes) {
  return nodes.map(n => {
    if (n.type === 'text') return esc(n.value).replace(/\n/g, '<br>');
    const inner = renderNodes(n.children);
    switch (n.tag) {
      case 'b': return `<b>${inner}</b>`;
      case 'i': return `<i>${inner}</i>`;
      case 'u': return `<u>${inner}</u>`;
      case 's': return `<s>${inner}</s>`;
      case 'quote': return `<div class="bb-quote">${inner}</div>`;
      default: return inner;
    }
  }).join('');
}

function renderBBCode(text) {
  if (!text.trim()) return '';
  return renderNodes(buildTree(tokenize(text)));
}

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];

function renderRefs(refs) {
  if (!refs || !refs.length) return '';
  return `<div class="play-refs">
    <div class="play-refs-label">Reference Games</div>
    <div class="play-refs-links">${refs.map(r => `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.label)}</a>`).join('')}</div>
  </div>`;
}

function renderPlayList() {
  const el = document.getElementById('play-list');
  if (!PLAYS.length) {
    el.innerHTML = '<div class="play-empty">no plays drafted yet</div>';
    return;
  }
  el.innerHTML = PLAYS.map((p, i) => `
    <div class="play-entry">
      <div class="play-eyebrow">Play ${ROMAN[i] || (i+1)}</div>
      <span class="play-title-text">${esc(p.title || 'Untitled Play')}</span>
      <div class="bb-body">${renderBBCode(p.body)}</div>
      ${renderRefs(p.refs)}
    </div>
  `).join('');
}

const PASSWORD = '12345678';
const LOCK_KEY = 'tacticaUnlocked';

function unlock() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('protected-content').style.display = 'block';
  renderPlayList();
}

function tryUnlock() {
  const input = document.getElementById('gate-input');
  if (input.value === PASSWORD) {
    localStorage.setItem(LOCK_KEY, 'true');
    unlock();
  } else {
    document.getElementById('gate-error').textContent = "wrong. try again.";
    input.value = '';
    input.focus();
  }
}

document.getElementById('gate-submit').addEventListener('click', tryUnlock);
document.getElementById('gate-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

if (localStorage.getItem(LOCK_KEY) === 'true') unlock();
</script>
